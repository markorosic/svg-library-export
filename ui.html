<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>SVG Library Export</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 11px;
      line-height: 16px;
      background-color: var(--figma-color-bg);
      color: var(--figma-color-text);
      padding: 12px;
    }

    /* ── Section layout ── */
    .section {
      padding-bottom: 12px;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--figma-color-border);
    }

    .section:last-child {
      border-bottom: none;
      padding-bottom: 0;
      margin-bottom: 0;
    }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--figma-color-text-secondary);
      margin-bottom: 6px;
    }

    /* ── Selection info ── */
    .selection-info {
      background: var(--figma-color-bg-secondary);
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 11px;
    }

    .selection-count {
      font-weight: 600;
      color: var(--figma-color-text);
    }

    .selection-items {
      margin-top: 2px;
      font-size: 10px;
      color: var(--figma-color-text-secondary);
    }

    /* ── Options (radio / checkbox rows) ── */
    .options {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      cursor: pointer;
      user-select: none;
      color: var(--figma-color-text);
      padding: 2px 4px;
      border-radius: 4px;
      margin: 0 -4px;
    }

    label:hover {
      background: var(--figma-color-bg-secondary);
    }

    input[type="checkbox"],
    input[type="radio"] {
      cursor: pointer;
      accent-color: var(--figma-color-bg-brand);
      flex-shrink: 0;
    }

    /* ── Text inputs ── */
    .field-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .field-row:last-child {
      margin-bottom: 0;
    }

    .field-label {
      font-size: 11px;
      color: var(--figma-color-text-secondary);
      width: 56px;
      flex-shrink: 0;
    }

    input[type="text"] {
      flex: 1;
      height: 28px;
      background: var(--figma-color-bg-secondary);
      border: 1px solid var(--figma-color-border);
      border-radius: 6px;
      padding: 0 8px;
      font-size: 11px;
      font-family: inherit;
      color: var(--figma-color-text);
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--figma-color-border-strong);
    }

    input[type="text"]::placeholder {
      color: var(--figma-color-text-secondary);
    }

    /* ── Buttons ── */
    .button-group {
      display: flex;
      gap: 8px;
    }

    button {
      flex: 1;
      height: 32px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      border: none;
      transition: background 0.1s;
    }

    button:disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    .btn-primary {
      background: var(--figma-color-bg-brand);
      color: var(--figma-color-text-onbrand);
    }

    .btn-primary:hover {
      background: var(--figma-color-bg-brand-hover);
    }

    .btn-secondary {
      background: var(--figma-color-bg-secondary);
      color: var(--figma-color-text);
      border: 1px solid var(--figma-color-border);
    }

    .btn-secondary:hover {
      background: var(--figma-color-bg-tertiary);
    }

    /* ── Progress ── */
    .progress {
      display: none;
    }

    .progress.visible {
      display: block;
    }

    .progress-bar-track {
      width: 100%;
      height: 3px;
      background: var(--figma-color-bg-secondary);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 4px;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--figma-color-bg-brand);
      transition: width 0.2s;
    }

    .progress-text {
      font-size: 10px;
      color: var(--figma-color-text-secondary);
    }

    /* ── Status ── */
    .status {
      font-size: 11px;
      display: none;
    }

    .status.visible {
      display: block;
    }

    .status.info    { color: var(--figma-color-text); }
    .status.success { color: var(--figma-color-text-success); }
    .status.warning { color: var(--figma-color-text-warning); }
    .status.error   { color: var(--figma-color-text-danger); }
  </style>
</head>
<body>
  <div>

    <!-- SELECTION -->
    <div class="section">
      <div class="section-label">Selection</div>
      <div id="selection-info" class="selection-info">
        <div class="selection-count">No selection</div>
        <div class="selection-items">Select items to export, or choose Entire Page</div>
      </div>
    </div>

    <!-- SCOPE -->
    <div class="section">
      <div class="section-label">Scope</div>
      <div class="options">
        <label>
          <input type="radio" name="export-type" value="selection" checked>
          Selected items
        </label>
        <label>
          <input type="radio" name="export-type" value="page">
          Entire page
        </label>
        <label style="margin-top: 2px;">
          <input type="checkbox" id="include-nested">
          Include nested components
        </label>
      </div>
    </div>

    <!-- FILE NAMING -->
    <div class="section">
      <div class="section-label">File Naming</div>
      <div class="field-row">
        <span class="field-label">Prefix</span>
        <input type="text" id="file-prefix" placeholder="e.g. icon-">
      </div>
      <div class="field-row">
        <span class="field-label">ZIP name</span>
        <input type="text" id="zip-name" placeholder="svg-export">
      </div>
    </div>

    <!-- SVG OPTIONS -->
    <div class="section">
      <div class="section-label">SVG Options</div>
      <div class="options">
        <label>
          <input type="checkbox" id="outline-text" checked>
          Outline text (convert to paths)
        </label>
        <label>
          <input type="checkbox" id="include-ids" checked>
          Include layer IDs
        </label>
      </div>
    </div>

    <!-- BUTTONS -->
    <div class="section">
      <div class="button-group">
        <button id="export-zip-btn" class="btn-primary">Export ZIP</button>
        <button id="export-individual-btn" class="btn-secondary">Export Files</button>
      </div>
    </div>

    <!-- PROGRESS -->
    <div id="progress" class="progress section">
      <div class="progress-bar-track">
        <div id="progress-fill" class="progress-bar-fill" style="width: 0%"></div>
      </div>
      <div id="progress-text" class="progress-text">Processing...</div>
    </div>

    <!-- STATUS -->
    <div id="status" class="status"></div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script>
    let _exportIntent = 'zip';

    function getExportOptions() {
      return {
        exportType: document.querySelector('input[name="export-type"]:checked').value,
        includeNested: document.getElementById('include-nested').checked,
        outlineText: document.getElementById('outline-text').checked,
        includeIds: document.getElementById('include-ids').checked,
        filePrefix: document.getElementById('file-prefix').value.trim(),
        zipName: document.getElementById('zip-name').value.trim() || 'svg-export',
      };
    }

    function setExporting(isExporting) {
      document.getElementById('export-zip-btn').disabled = isExporting;
      document.getElementById('export-individual-btn').disabled = isExporting;
    }

    function updateSelectionInfo(info) {
      const container = document.getElementById('selection-info');
      // Clear existing children safely
      while (container.firstChild) {
        container.removeChild(container.firstChild);
      }

      const countEl = document.createElement('div');
      countEl.className = 'selection-count';
      const itemsEl = document.createElement('div');
      itemsEl.className = 'selection-items';

      if (info.count === 0) {
        countEl.textContent = 'No selection';
        itemsEl.textContent = 'Select items to export, or choose Entire Page';
      } else {
        countEl.textContent = `${info.count} item${info.count > 1 ? 's' : ''} selected`;
        const suffix = info.hasMore ? ` +${info.count - 5} more` : '';
        itemsEl.textContent = info.items.join(', ') + suffix;
      }

      container.appendChild(countEl);
      container.appendChild(itemsEl);
    }

    function showStatus(message, level) {
      const icons = { success: '✓ ', warning: '⚠ ', error: '✕ ', info: '' };
      const statusEl = document.getElementById('status');
      statusEl.textContent = (icons[level] || '') + message;
      statusEl.className = 'status visible ' + (level || 'info');
    }

    function updateProgress(current, total, itemName) {
      document.getElementById('progress').classList.add('visible');
      document.getElementById('progress-fill').style.width = `${(current / total) * 100}%`;
      document.getElementById('progress-text').textContent = `${current} / ${total}  ${itemName}`;
    }

    function hideProgress() {
      document.getElementById('progress').classList.remove('visible');
    }

    function downloadFile(fileName, content, mimeType) {
      const blob = new Blob([content], { type: mimeType || 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }

    function downloadAllFiles(exportData) {
      exportData.forEach(function(item, index) {
        setTimeout(function() { downloadFile(item.fileName, item.svg, 'image/svg+xml'); }, index * 100);
      });
    }

    async function downloadAsZip(exportData, zipBaseName) {
      try {
        showStatus('Creating ZIP file...', 'info');
        const zip = new JSZip();
        exportData.forEach(function(item) { zip.file(item.fileName, item.svg); });
        const content = await zip.generateAsync({ type: 'blob' });
        const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, -5);
        downloadFile(zipBaseName + '-' + timestamp + '.zip', content, 'application/zip');
      } catch (error) {
        showStatus('Error creating ZIP: ' + error.message, 'error');
      }
    }

    // Button handlers
    document.getElementById('export-zip-btn').onclick = function() {
      _exportIntent = 'zip';
      setExporting(true);
      parent.postMessage({ pluginMessage: { type: 'export-svg', options: getExportOptions() } }, '*');
    };

    document.getElementById('export-individual-btn').onclick = function() {
      _exportIntent = 'individual';
      setExporting(true);
      parent.postMessage({ pluginMessage: { type: 'export-svg', options: getExportOptions() } }, '*');
    };

    // Handle messages from plugin
    onmessage = function(event) {
      const msg = event.data.pluginMessage;

      if (msg.type === 'selection-info') {
        updateSelectionInfo(msg);
      } else if (msg.type === 'status') {
        showStatus(msg.message, msg.level || 'info');
        if (msg.level === 'success' || msg.level === 'error' || msg.level === 'warning') {
          hideProgress();
          setExporting(false);
        }
      } else if (msg.type === 'progress') {
        updateProgress(msg.current, msg.total, msg.itemName);
      } else if (msg.type === 'export-complete') {
        hideProgress();
        if (msg.errors && msg.errors.length > 0) {
          console.warn('Export errors:', msg.errors);
        }
        if (_exportIntent === 'zip') {
          downloadAsZip(msg.data, msg.zipName || 'svg-export');
        } else {
          downloadAllFiles(msg.data);
          setExporting(false);
        }
      }
    };

    // Request initial selection info
    parent.postMessage({ pluginMessage: { type: 'get-selection-info' } }, '*');
  </script>
</body>
</html>
